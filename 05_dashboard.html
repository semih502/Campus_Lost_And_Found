<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &amp; Register | Campus Lost &amp; Found</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Ana modüler CSS bağlantısı -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg c-navbar shadow mb-5">
        <div class="container">

            <a class="navbar-brand c-navbar__brand" href="index.html">
                <span>🎓</span> Campus Lost &amp; Found
            </a>

            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavMenu"
                aria-controls="mainNavMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="mainNavMenu">
                <div class="ms-auto d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <!-- Giriş yapmamış kullanıcı için sadece ana sayfa linki -->
                    <a class="nav-link text-white" href="index.html">Home</a>
                </div>
            </div>

        </div>
    </nav>


    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="c-card p-4 shadow-sm border-0 rounded-4 bg-white">


                    <ul class="nav nav-pills nav-fill mb-4 p-1 bg-light rounded-3" id="authTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link active fw-bold"
                                id="login-tab"
                                data-bs-toggle="pill"
                                data-bs-target="#login"
                                type="button"
                                role="tab"
                                aria-controls="login"
                                aria-selected="true"
                            >Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button
                                class="nav-link fw-bold"
                                id="register-tab"
                                data-bs-toggle="pill"
                                data-bs-target="#register"
                                type="button"
                                role="tab"
                                aria-controls="register"
                                aria-selected="false"
                            >Register</button>
                        </li>
                    </ul>
                    <!-- /SEKMELER -->


                    <div class="tab-content" id="authTabContent">

                        <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                            <form action="login_process.php" method="POST" id="loginForm" novalidate>

                                <div class="mb-3">
                                    <label for="loginEmail" class="fw-bold small text-uppercase text-muted mb-2">
                                        Email Address
                                    </label>
                                    <input
                                        type="email"
                                        id="loginEmail"
                                        name="email"
                                        class="form-control py-2"
                                        placeholder="name@std.university.edu"
                                        required
                                    >
                                    <div class="invalid-feedback">Please enter a valid email address.</div>
                                </div>

                                <div class="mb-4">
                                    <label for="loginPassword" class="fw-bold small text-uppercase text-muted mb-2">
                                        Password
                                    </label>
                                 
                                    <div class="input-group">
                                        <input
                                            type="password"
                                            id="loginPassword"
                                            name="password"
                                            class="form-control py-2"
                                            placeholder="••••••••"
                                            required
                                        >
                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary"
                                            onclick="togglePassword('loginPassword', this)"
                                            aria-label="Show or hide password"
                                        >👁</button>
                                    </div>
                                    <div class="invalid-feedback">Please enter your password.</div>
                                </div>

                                <!-- Gönder butonu -->
                                <div class="d-grid">
                                    <button
                                        type="submit"
                                        id="loginBtn"
                                        class="btn c-btn-primary py-2 fw-bold"
                                    >
                                        Sign In
                                    </button>
                                </div>

                            </form>
                        </div>
                        <!-- /LOGIN FORMU -->

                        <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
                            <form action="register_process.php" method="POST" id="registerForm" novalidate>

                                <!-- Ad Soyad -->
                                <div class="mb-3">
                                    <label for="regFullName" class="fw-bold small text-uppercase text-muted mb-2">
                                        Full Name
                                    </label>
                                    <input
                                        type="text"
                                        id="regFullName"
                                        name="full_name"
                                        class="form-control py-2"
                                        placeholder="John Doe"
                                        maxlength="100"
                                        required
                                    >
                                    <div class="invalid-feedback">Please enter your full name.</div>
                                </div>

                                <!-- E-posta -->
                                <div class="mb-3">
                                    <label for="regEmail" class="fw-bold small text-uppercase text-muted mb-2">
                                        Email Address
                                    </label>
                                    <input
                                        type="email"
                                        id="regEmail"
                                        name="email"
                                        class="form-control py-2"
                                        placeholder="name@std.university.edu"
                                        required
                                    >
                                    <div class="invalid-feedback">Please enter a valid email address.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="regUserType" class="fw-bold small text-uppercase text-muted mb-2">
                                        User Type
                                    </label>
                                    <select
                                        id="regUserType"
                                        name="user_type"
                                        class="form-select py-2"
                                        required
                                    >
                                        <option value="" disabled selected>Select user type</option>
                                        <option value="student">Student</option>
                                        <option value="staff">Staff / Personnel</option>
                                    </select>
                                    <div class="invalid-feedback">Please select a user type.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="regOfficialId" class="fw-bold small text-uppercase text-muted mb-2">
                                        Student / Staff ID
                                    </label>
                                    <input
                                        type="text"
                                        id="regOfficialId"
                                        name="official_id"
                                        class="form-control py-2"
                                        placeholder="231020XXXX"
                                        pattern="\d{10}"
                                        maxlength="10"
                                        required
                                    >
                                    <div class="invalid-feedback">Please enter a valid 10-digit ID number.</div>
                                </div>

                                <!-- Şifre — göster/gizle ile -->
                                <div class="mb-3">
                                    <label for="regPassword" class="fw-bold small text-uppercase text-muted mb-2">
                                        Password
                                    </label>
                                    <div class="input-group">
                                        <input
                                            type="password"
                                            id="regPassword"
                                            name="password"
                                            class="form-control py-2"
                                            placeholder="Create a password"
                                            minlength="8"
                                            required
                                        >
                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary"
                                            onclick="togglePassword('regPassword', this)"
                                            aria-label="Show or hide password"
                                        >👁</button>
                                    </div>
                                    <div class="invalid-feedback">Password must be at least 8 characters.</div>
                                </div>

                                <div class="mb-4">
                                    <label for="regPasswordConfirm" class="fw-bold small text-uppercase text-muted mb-2">
                                        Confirm Password
                                    </label>
                                    <div class="input-group">
                                        <input
                                            type="password"
                                            id="regPasswordConfirm"
                                            name="password_confirm"
                                            class="form-control py-2"
                                            placeholder="Repeat your password"
                                            required
                                        >
                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary"
                                            onclick="togglePassword('regPasswordConfirm', this)"
                                            aria-label="Show or hide password"
                                        >👁</button>
                                    </div>
                                    <!-- Eşleşmeme hatası JS tarafından tetiklenir -->
                                    <div id="passwordMismatch" class="text-danger small mt-1" style="display:none;">
                                        Passwords do not match.
                                    </div>
                                </div>

                                <!-- Gönder butonu -->
                                <div class="d-grid">
                                    <button
                                        type="submit"
                                        id="registerBtn"
                                        class="btn c-btn-primary py-2 fw-bold"
                                    >
                                        Create Account
                                    </button>
                                </div>

                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const form = this;
            const btn  = document.getElementById('loginBtn');

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            // Çift tıklama koruması
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            setTimeout(() => {
                console.log('Login isteği gönderildi.');
               
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }, 1000);
        });

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const form      = this;
            const btn       = document.getElementById('registerBtn');
            const password  = document.getElementById('regPassword').value;
            const confirm   = document.getElementById('regPasswordConfirm').value;
            const mismatch  = document.getElementById('passwordMismatch');

            // Şifre eşleşme kontrolü
            if (password !== confirm) {
                mismatch.style.display = 'block';
                return;
            } else {
                mismatch.style.display = 'none';
            }

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            // Çift tıklama koruması — login ve create-ad ile aynı pattern
            btn.textContent = 'Creating account...';
            btn.disabled = true;

            // TODO: fetch('/register_process.php', { method: 'POST', body: new FormData(form) })
            setTimeout(() => {
                console.log('Kayıt isteği gönderildi.');
                // TODO: Başarılı kayıtta login sekmesine geç veya index.html'e yönlendir
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }, 1000);
        });

    </script>

</body>
</html>
