<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Campus Lost &amp; Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Ana modüler CSS bağlantısı -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-light">

    <!-- =============================================
         NAVBAR — Giriş yapmış kullanıcı için
    ============================================= -->
    <nav class="navbar navbar-expand-lg c-navbar shadow mb-5">
        <div class="container">

            <a class="navbar-brand c-navbar__brand" href="01_index.html">
                <span>🎓</span> Campus Lost &amp; Found
            </a>

            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavMenu"
                aria-controls="mainNavMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavMenu">
                <div class="ms-auto d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a class="nav-link text-white" href="01_index.html">Home</a>
                    <a class="nav-link text-white" href="03_create-ad.html">+ Post New Ad</a>
                    <!-- Kullanıcı adı session'dan dinamik olarak yazılacak -->
                    <span class="nav-link text-white fw-bold" id="navUserName">👤 Loading...</span>
                </div>
            </div>

        </div>
    </nav>
    <!-- /NAVBAR -->


    <!-- =============================================
         DASHBOARD İÇERİK
    ============================================= -->
    <div class="container mb-5">

        <!-- Karşılama Başlığı — Kullanıcı adı JS ile doldurulur -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <div class="c-card p-4 shadow-sm border-0 rounded-4 bg-white">
                    <h2 class="fw-bold mb-1">
                        Welcome, <span id="dashUserName">...</span>! 👋
                    </h2>
                    <p class="text-muted mb-0">
                        Role: <span id="dashUserType" class="badge bg-primary">...</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Hızlı İşlem Kartları -->
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="row g-3">

                    <!-- Yeni İlan Oluştur -->
                    <div class="col-sm-6">
                        <a href="03_create-ad.html" class="text-decoration-none">
                            <div class="c-card p-4 shadow-sm border-0 rounded-4 bg-white text-center h-100">
                                <div class="fs-1 mb-2">📝</div>
                                <h5 class="fw-bold">Post New Listing</h5>
                                <p class="text-muted small mb-0">Report a lost or found item on campus</p>
                            </div>
                        </a>
                    </div>

                    <!-- Tüm İlanları Gör -->
                    <div class="col-sm-6">
                        <a href="01_index.html" class="text-decoration-none">
                            <div class="c-card p-4 shadow-sm border-0 rounded-4 bg-white text-center h-100">
                                <div class="fs-1 mb-2">🔍</div>
                                <h5 class="fw-bold">Browse All Listings</h5>
                                <p class="text-muted small mb-0">Search through all lost &amp; found items</p>
                            </div>
                        </a>
                    </div>

                    <!-- Mesajlar -->
                    <div class="col-sm-6">
                        <a href="06_messages.html" class="text-decoration-none">
                            <div class="c-card p-4 shadow-sm border-0 rounded-4 bg-white text-center h-100">
                                <div class="fs-1 mb-2">💬</div>
                                <h5 class="fw-bold">Messages</h5>
                                <p class="text-muted small mb-0">Check your conversations with other users</p>
                            </div>
                        </a>
                    </div>

                    <!-- Çıkış Yap -->
                    <div class="col-sm-6">
                        <a href="#" id="logoutBtn" class="text-decoration-none">
                            <div class="c-card p-4 shadow-sm border-0 rounded-4 bg-white text-center h-100">
                                <div class="fs-1 mb-2">🚪</div>
                                <h5 class="fw-bold text-danger">Logout</h5>
                                <p class="text-muted small mb-0">Sign out from your account</p>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </div>

    </div>
    <!-- /DASHBOARD İÇERİK -->


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* ============================================================
         *  OTURUM KONTROLÜ — Sayfa yüklendiğinde çalışır
         * ============================================================
         *  check_session.php'ye AJAX isteği atarak kullanıcının
         *  aktif oturumu olup olmadığını kontrol eder.
         *  - Oturum varsa: kullanıcı bilgilerini sayfaya yazar.
         *  - Oturum yoksa: 04_auth.html'e yönlendirir.
         * ============================================================ */
        document.addEventListener('DOMContentLoaded', function () {

            fetch('php/check_session.php')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // ✅ Oturum aktif — kullanıcı bilgilerini göster

                        // Navbar'daki kullanıcı adı
                        document.getElementById('navUserName').textContent =
                            '👤 ' + data.user.full_name;

                        // Dashboard karşılama başlığındaki isim
                        document.getElementById('dashUserName').textContent =
                            data.user.full_name;

                        // Kullanıcı rolü badge'i
                        const typeEl = document.getElementById('dashUserType');
                        typeEl.textContent = data.user.user_type === 'student'
                            ? 'Student'
                            : 'Staff / Personnel';

                    } else {
                        // ❌ Oturum yok — login sayfasına yönlendir
                        window.location.href = '04_auth.html';
                    }
                })
                .catch(error => {
                    // Ağ hatası — güvenli tarafta kal, login'e yönlendir
                    console.error('Session kontrol hatası:', error);
                    window.location.href = '04_auth.html';
                });
        });


        /* ============================================================
         *  ÇIKIŞ İŞLEMİ — Logout butonu
         * ============================================================ */
        document.getElementById('logoutBtn').addEventListener('click', function (e) {
            e.preventDefault();

            fetch('php/logout.php')
                .then(response => response.json())
                .then(data => {
                    // Session temizlendi — login sayfasına yönlendir
                    window.location.href = '04_auth.html';
                })
                .catch(() => {
                    // Hata olsa bile login'e yönlendir
                    window.location.href = '04_auth.html';
                });
        });

    </script>

</body>
</html>
