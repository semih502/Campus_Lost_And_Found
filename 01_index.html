<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!--Türkçe karakterler için-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Mobil cihazlar için otomatik boyutlandırma-->
    <title>Campus Lost &amp; Found | Home</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!--Bootstrap kütüphanesini dışarıdan yükler-->
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css"> <!-- Ana CSS dosyası -->
</head>
<body>

    <nav class="navbar navbar-expand-lg c-navbar shadow mb-4">
        <div class="container">

            <a class="navbar-brand c-navbar__brand" href="01_index.html">
                <span>🎓</span> Campus Lost &amp; Found
            </a>

            <!--Mobilde görünür, masaüstünde gizlenir -->
            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavMenu"
                aria-controls="mainNavMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <!--Mobilde açılır/kapanır menü -->
            <div class="collapse navbar-collapse" id="mainNavMenu">
                <div class="ms-auto d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a class="nav-link text-white" href="05_dashboard.html">My Listings</a>
                    <a class="btn c-btn-primary px-4 shadow-sm" href="03_create-ad.html">+ Post New Ad</a>
                </div>
            </div>

        </div>
    </nav>

    <div class="container">
        <div class="row">

            <aside class="col-md-3 mb-4">
                <div class="c-filter shadow-sm p-4 bg-white rounded-4">

                    <h5 class="fw-bold mb-3 c-filter__title">Search</h5>

                    <label for="searchInput" class="visually-hidden">Search listings</label>
                    <input
                        type="text"
                        id="searchInput"
                        class="form-control mb-4 py-2"
                        placeholder="Looking for something?"
                        aria-label="Search listings"
                    >

                    <!-- Kategori Filtresi -->
                    <h6 class="fw-bold text-muted small text-uppercase mb-3">Categories</h6>
                    <label for="categorySelect" class="visually-hidden">Select category</label>
                    <select id="categorySelect" class="form-select c-select mb-4 py-2 rounded-3">
                        <option value="0" selected>🔍 All Categories</option>

                        <optgroup label="Technology">
                            <option value="1">Electronics (Laptop, Phone, Charger)</option>
                            <option value="2">Computer Accessories (Mouse, Flash Drive)</option>
                        </optgroup>

                        <optgroup label="Personal Items">
                            <option value="3">Wallets &amp; ID Cards</option>
                            <option value="4">Keys &amp; Keychains</option>
                            <option value="5">Bags &amp; Backpacks</option>
                        </optgroup>

                        <optgroup label="Academic">
                            <option value="6">Books &amp; Notebooks</option>
                            <option value="7">Stationery (Pens, Calculators)</option>
                        </optgroup>

                        <optgroup label="Other">
                            <option value="8">Clothing &amp; Accessories</option>
                            <option value="9">Sports &amp; Hobby Gear</option>
                            <option value="10">Miscellaneous</option>
                        </optgroup>
                    </select>

                    <!-- Durum Filtresi -->
                    <h6 class="fw-bold text-muted small text-uppercase mb-3">Status</h6>
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="checkLost">
                            <label class="form-check-label" for="checkLost">Lost Items</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="checkFound">
                            <label class="form-check-label" for="checkFound">Found Items</label>
                        </div>
                    </div>

                    <button
                        type="button"
                        id="filterBtn"
                        class="btn btn-dark w-100 py-2 fw-bold text-uppercase"
                        onclick="applyFilters()"
                    >
                        Filter Results
                    </button>

                </div>
            </aside>
            <!-- /FİLTRE PANELİ -->


            <!-- =============================================
                 İLAN KARTLARI — Dinamik olarak get_listings.php'den
                 yüklenir. Boş container, JS tarafından doldurulur.
            ============================================= -->
            <main class="col-md-9">
                <div class="row" id="listingsContainer">
                    <!-- Yükleniyor göstergesi -->
                    <div class="col-12 text-center py-5" id="loadingIndicator">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-muted mt-2">Loading listings...</p>
                    </div>
                </div>
            </main>
            <!-- /İLAN KARTLARI -->

        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* ============================================================
         *  GLOBAL DEĞİŞKENLER
         * ============================================================ */
        // Veritabanından çekilen tüm ilanlar burada tutulur.
        // Filtreleme işlemi bu dizi üzerinden yapılır (client-side).
        let allListings = [];

        /* ============================================================
         *  XSS KORUMASI — Kullanıcı girdilerini güvenli göster
         * ============================================================ */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        /* ============================================================
         *  KART OLUŞTURMA — Bir ilan verisinden HTML kart üretir
         * ============================================================ */
        function createListingCard(item) {
            const statusClass = item.status === 'Lost' ? 'bg-danger' : 'bg-success';
            const statusText  = item.status === 'Lost' ? 'Lost' : 'Found';

            // Fotoğraf yoksa placeholder göster
            const imgHtml = item.photo
                ? `<img src="${escapeHtml(item.photo)}" class="card-img-top c-card__img" alt="${escapeHtml(item.title)}" loading="lazy">`
                : `<div class="card-img-top c-card__img d-flex align-items-center justify-content-center bg-light" style="height:200px;"><span style="font-size:3rem;">📦</span></div>`;

            // Açıklamayı 80 karakterle kes
            const shortDesc = item.description.length > 80
                ? item.description.substring(0, 80) + '...'
                : item.description;

            return `
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card c-card shadow-sm h-100 border-0">
                        <span class="badge ${statusClass} c-card__badge">${statusText}</span>
                        ${imgHtml}
                        <div class="card-body p-3">
                            <span class="c-card__accent d-block mb-1 text-primary small fw-bold">
                                ${escapeHtml(item.category)}
                            </span>
                            <h6 class="card-title fw-bold mb-2">${escapeHtml(item.title)}</h6>
                            <p class="card-text text-muted small mb-0">
                                ${escapeHtml(shortDesc)}
                            </p>
                        </div>
                        <div class="card-footer bg-white border-0 p-3 pt-0">
                            <a href="02_details.html?id=${item.id}" class="btn btn-outline-dark btn-sm w-100 fw-bold">
                                View Details
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        /* ============================================================
         *  KARTLARI RENDER ET — Verilen ilan dizisini sayfaya bas
         * ============================================================ */
        function renderListings(listings) {
            const container = document.getElementById('listingsContainer');

            if (listings.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <span style="font-size:3rem;">🔍</span>
                        <h5 class="text-muted mt-3">No listings found</h5>
                        <p class="text-muted">Try adjusting your filters or check back later.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = listings.map(createListingCard).join('');
        }

        /* ============================================================
         *  FİLTRELEME — Client-side filtreleme (bellekteki veri)
         * ============================================================ */
        function applyFilters() {
            const query     = document.getElementById('searchInput').value.trim().toLowerCase();
            const category  = document.getElementById('categorySelect').value;
            const lostOnly  = document.getElementById('checkLost').checked;
            const foundOnly = document.getElementById('checkFound').checked;

            const btn = document.getElementById('filterBtn');
            btn.textContent = 'Filtering...';
            btn.disabled = true;

            let filtered = allListings;

            // Metin araması — başlık ve açıklamada
            if (query) {
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(query) ||
                    item.description.toLowerCase().includes(query)
                );
            }

            // Kategori filtresi (value="0" = tümü)
            if (category !== '0') {
                filtered = filtered.filter(item =>
                    item.category.toLowerCase().includes(
                        document.getElementById('categorySelect')
                            .options[document.getElementById('categorySelect').selectedIndex]
                            .textContent.trim().split('(')[0].trim().toLowerCase()
                    )
                );
            }

            // Durum filtresi
            if (lostOnly && !foundOnly) {
                filtered = filtered.filter(item => item.status === 'Lost');
            } else if (foundOnly && !lostOnly) {
                filtered = filtered.filter(item => item.status === 'Found');
            }

            renderListings(filtered);

            btn.textContent = 'Filter Results';
            btn.disabled = false;
        }

        /* ============================================================
         *  SAYFA YÜKLENDİĞİNDE — İlanları çek ve göster
         * ============================================================ */
        document.addEventListener('DOMContentLoaded', function () {
            fetch('php/get_listings.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        allListings = data.listings;
                        renderListings(allListings);
                    } else {
                        document.getElementById('listingsContainer').innerHTML = `
                            <div class="col-12 text-center py-5">
                                <span style="font-size:3rem;">⚠️</span>
                                <h5 class="text-muted mt-3">Failed to load listings</h5>
                                <p class="text-muted">${escapeHtml(data.message || 'Unknown error')}</p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Listings Fetch Error:', error);
                    document.getElementById('listingsContainer').innerHTML = `
                        <div class="col-12 text-center py-5">
                            <span style="font-size:3rem;">🔌</span>
                            <h5 class="text-muted mt-3">Connection Error</h5>
                            <p class="text-muted">Could not connect to the server. Please try again.</p>
                        </div>
                    `;
                });
        });
    </script>

</body>
</html>
