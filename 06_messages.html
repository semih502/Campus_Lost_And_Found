<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Campus Lost &amp; Found</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Ana modüler CSS bağlantısı -->
    <link rel="stylesheet" href="css/main.css">

    <style>
        .chat-inbox      { height: 70vh; }
        .message-list    { overflow-y: auto; border-right: 1px solid #eee; }
        .message-content { overflow-y: auto; background: #f8f9fa; }
        .msg-bubble      { max-width: 75%; border-radius: 15px; padding: 10px 15px; }
        .msg-sent        { background-color: var(--primary-color, #1a237e); color: white; margin-left: auto; }
        .msg-received    { background-color: #e9ecef; color: #333; }
        .c-avatar        { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg c-navbar shadow mb-4">
        <div class="container">

            <!-- Marka / Logo -->
            <a class="navbar-brand c-navbar__brand" href="01_index.html">
                <span>🎓</span> Campus Lost &amp; Found
            </a>

            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavMenu"
                aria-controls="mainNavMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavMenu">
                <div class="ms-auto d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a class="nav-link text-white" href="05_dashboard.html">My Listings</a>
                    <!-- Aktif sayfa vurgusu korundu -->
                    <a class="nav-link text-white active fw-bold" href="06_messages.html">Messages</a>
                    <a class="btn c-btn-primary px-4 shadow-sm" href="03_create-ad.html">+ New Ad</a>
                </div>
            </div>

        </div>
    </nav>


    <div class="container mb-5">
        <div class="c-card shadow-sm border-0 rounded-4 bg-white overflow-hidden">
            <div class="row g-0 chat-inbox">

                <aside class="col-md-4 message-list">
                    <div class="p-3 border-bottom bg-light">
                        <h5 class="fw-bold mb-0">Conversations</h5>
                    </div>

                    <div class="list-group list-group-flush" id="conversationList">
                        <!-- Dinamik: get_conversations.php'den yüklenir -->
                        <div class="text-center py-4" id="convLoading">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <p class="text-muted small mt-1 mb-0">Loading...</p>
                        </div>
                    </div>
                </aside>
     
                <main class="col-md-8 d-flex flex-column">

                    <!-- Sohbet Başlığı -->
                    <div class="p-3 border-bottom d-flex align-items-center justify-content-between bg-white">
                        <h6 class="mb-0 fw-bold" id="chatPartnerName">Select a conversation</h6>
                        <span class="badge bg-secondary" id="chatItemBadge" style="display:none;"></span>
                    </div>

                    <div class="message-content flex-grow-1 p-4 d-flex flex-column gap-3" id="messageFlow">
                        <!-- Dinamik: get_messages.php'den yüklenir -->
                        <div class="text-center text-muted py-5" id="emptyChat">
                            <span style="font-size:2.5rem;">💬</span>
                            <p class="mt-2">Select a conversation to view messages.</p>
                        </div>
                    </div>

                    <div class="p-3 border-top bg-white">
                        <form class="d-flex gap-2" id="messageForm" novalidate>

                            <label for="msgInput" class="visually-hidden">Type a message</label>
                            <input
                                type="text"
                                id="msgInput"
                                class="form-control py-2"
                                placeholder="Type your message here..."
                                aria-label="Type a message"
                                autocomplete="off"
                                maxlength="500"
                                disabled
                            >
                            <button
                                type="submit"
                                id="sendBtn"
                                class="btn c-btn-primary px-4 fw-bold"
                                disabled
                            >
                                Send
                            </button>

                        </form>
                    </div>
                    <!-- /Mesaj Giriş Alanı -->

                </main>

            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* ============================================================
         *  GLOBAL DEĞİŞKENLER
         * ============================================================ */
        let currentUserId  = null;  // Giriş yapmış kullanıcı ID'si
        let activePartnerId = null; // Seçili konuşma partneri
        let refreshTimer    = null; // Otomatik yenileme zamanlayıcısı

        /* ============================================================
         *  XSS KORUMASI
         * ============================================================ */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text || ''));
            return div.innerHTML;
        }

        /* ============================================================
         *  İNİSYAL OLUŞTUR — İsimden avatar harfleri
         * ============================================================ */
        function getInitials(name) {
            if (!name) return '?';
            const parts = name.trim().split(' ');
            return parts.length >= 2
                ? (parts[0][0] + parts[1][0]).toUpperCase()
                : parts[0][0].toUpperCase();
        }

        /* ============================================================
         *  KONUŞMA LİSTESİNİ YÜKLE (Sol Menü)
         * ============================================================ */
        function loadConversations() {
            fetch('php/get_conversations.php')
                .then(response => {
                    if (response.status === 401) {
                        window.location.href = '04_auth.html';
                        throw new Error('UNAUTHORIZED');
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data.success) {
                        document.getElementById('conversationList').innerHTML =
                            '<p class="text-muted text-center p-3">Konuşma bulunamadı.</p>';
                        return;
                    }

                    currentUserId = data.current_user;
                    const list = document.getElementById('conversationList');

                    if (data.conversations.length === 0) {
                        list.innerHTML = `
                            <div class="text-center py-4">
                                <span style="font-size:2rem;">📭</span>
                                <p class="text-muted small mt-2 mb-0">No conversations yet.</p>
                            </div>
                        `;
                        return;
                    }

                    list.innerHTML = data.conversations.map(conv => {
                        const isActive = parseInt(conv.partner_id) === activePartnerId;
                        const preview = conv.last_message.length > 35
                            ? conv.last_message.substring(0, 35) + '...'
                            : conv.last_message;

                        return `
                            <a href="#" class="list-group-item list-group-item-action p-3 border-0 ${isActive ? 'active' : ''}"
                               onclick="openConversation(${conv.partner_id}, '${escapeHtml(conv.partner_name)}'); return false;">
                                <div class="d-flex align-items-center">
                                    <div class="c-avatar rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center fw-bold flex-shrink-0">
                                        ${getInitials(conv.partner_name)}
                                    </div>
                                    <div class="ms-3 overflow-hidden">
                                        <h6 class="mb-0 fw-bold">${escapeHtml(conv.partner_name)}</h6>
                                        <small class="${isActive ? 'opacity-75' : 'text-muted'}">${escapeHtml(preview)}</small>
                                    </div>
                                </div>
                            </a>
                        `;
                    }).join('');
                })
                .catch(error => {
                    if (error.message === 'UNAUTHORIZED') return;
                    console.error('Conversations Error:', error);
                });
        }

        /* ============================================================
         *  KONUŞMAYI AÇ — Partner'ın mesaj geçmişini yükle
         * ============================================================ */
        function openConversation(partnerId, partnerName) {
            activePartnerId = partnerId;

            // Başlığı güncelle
            document.getElementById('chatPartnerName').textContent = partnerName;

            // Input'u aktifleştir
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            // Sol menüde aktif elemanı güncelle
            loadConversations();

            // Mesajları yükle
            loadMessages(partnerId);

            // Otomatik yenileme başlat (5 saniyede bir)
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => loadMessages(partnerId), 5000);
        }

        /* ============================================================
         *  MESAJLARI YÜKLE — Seçili sohbetin geçmişi
         * ============================================================ */
        function loadMessages(partnerId) {
            fetch('php/get_messages.php?partner_id=' + partnerId)
                .then(response => response.json())
                .then(data => {
                    if (!data.success) return;

                    const flow = document.getElementById('messageFlow');
                    const wasAtBottom = flow.scrollTop + flow.clientHeight >= flow.scrollHeight - 50;

                    flow.innerHTML = '';

                    if (data.messages.length === 0) {
                        flow.innerHTML = `
                            <div class="text-center text-muted py-5">
                                <span style="font-size:2rem;">✉️</span>
                                <p class="mt-2">No messages yet. Start the conversation!</p>
                            </div>
                        `;
                        return;
                    }

                    data.messages.forEach(msg => {
                        const isSent = parseInt(msg.sender_id) === currentUserId;
                        const time = new Date(msg.created_at);
                        const timeStr = time.getHours().toString().padStart(2, '0') + ':' +
                                        time.getMinutes().toString().padStart(2, '0');

                        const wrapper = document.createElement('div');
                        wrapper.className = 'd-flex flex-column ' + (isSent ? 'align-items-end' : 'align-items-start') + ' gap-1';
                        wrapper.innerHTML = `
                            <div class="msg-bubble ${isSent ? 'msg-sent shadow-sm' : 'msg-received'}">
                                ${escapeHtml(msg.content)}
                            </div>
                            <small class="text-muted ${isSent ? 'me-1' : 'ms-1'}" style="font-size: 11px;">${timeStr}</small>
                        `;
                        flow.appendChild(wrapper);
                    });

                    // Otomatik scroll (sadece zaten alttaysa)
                    if (wasAtBottom || flow.scrollTop === 0) {
                        flow.scrollTop = flow.scrollHeight;
                    }
                })
                .catch(error => console.error('Messages Error:', error));
        }

        /* ============================================================
         *  MESAJ GÖNDER — Form submit ve Enter tuşu
         * ============================================================ */
        function sendMessage() {
            if (!activePartnerId) return;

            const input   = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendBtn');
            const text    = input.value.trim();

            if (!text) return;

            sendBtn.textContent = 'Sending...';
            sendBtn.disabled = true;

            const formData = new FormData();
            formData.append('receiver_id', activePartnerId);
            formData.append('content', text);

            fetch('php/send_message.php', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.status === 401) {
                    window.location.href = '04_auth.html';
                    throw new Error('UNAUTHORIZED');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    input.value = '';
                    // Mesajları yeniden yükle
                    loadMessages(activePartnerId);
                } else {
                    alert('❌ ' + data.message);
                }
                sendBtn.textContent = 'Send';
                sendBtn.disabled = false;
                input.focus();
            })
            .catch(error => {
                if (error.message === 'UNAUTHORIZED') return;
                console.error('Send Error:', error);
                sendBtn.textContent = 'Send';
                sendBtn.disabled = false;
            });
        }

        /* ============================================================
         *  EVENT LISTENERS
         * ============================================================ */
        document.getElementById('messageForm').addEventListener('submit', function (e) {
            e.preventDefault();
            sendMessage();
        });

        document.getElementById('msgInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        /* ============================================================
         *  SAYFA YÜKLENDİĞİNDE — Konuşmaları yükle + URL param kontrolü
         * ============================================================ */
        document.addEventListener('DOMContentLoaded', function () {
            loadConversations();

            // URL'den partner parametresi varsa otomatik sohbet aç
            // Örn: 06_messages.html?partner=5
            const params = new URLSearchParams(window.location.search);
            const partnerId = params.get('partner');

            if (partnerId) {
                // Kısa gecikme ile konuşma listesi yüklendikten sonra aç
                setTimeout(() => {
                    openConversation(parseInt(partnerId), 'Loading...');
                }, 500);
            }
        });

    </script>

</body>
</html>
