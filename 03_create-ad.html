<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Ad | Campus Lost &amp; Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg c-navbar shadow mb-5">
        <div class="container">

            <a class="navbar-brand c-navbar__brand" href="index.html">
                <span>🎓</span> Campus Lost &amp; Found
            </a>

            <!--Mobilde görünür, masaüstünde gizlenir -->
            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavMenu"
                aria-controls="mainNavMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <!--Mobilde açılır/kapanır -->
            <div class="collapse navbar-collapse" id="mainNavMenu">
                <div class="ms-auto d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a class="nav-link text-white" href="dashboard.html">My Listings</a>
                    <a class="btn c-btn-primary px-4 shadow-sm" href="create-ad.html">+ Post New Ad</a>
                </div>
            </div>

        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="c-card p-5 shadow-sm border-0 rounded-4 bg-white">

                    <h2 class="fw-bold mb-4 c-form__title">Post a New Listing</h2>

                    <!-- =============================================
                         FORM
                         action: PHP backend hazır olunca upload_logic.php
                         enctype: dosya yükleme için zorunlu — doğru ✅
                         novalidate: özel JS validasyonu aktif olduğunda
                                     tarayıcı native validasyonunu devre dışı bırakır
                    ============================================= -->
                    <form
                        action="upload_logic.php"
                        method="POST"
                        enctype="multipart/form-data"
                        id="newAdForm"
                        novalidate
                    >

                        <div class="mb-4">
                            <span class="d-block fw-bold small text-uppercase text-muted mb-2">
                                Listing Type
                            </span>
                            <div class="d-flex gap-3">
                                <input
                                    type="radio"
                                    class="btn-check"
                                    name="status"
                                    id="typeLost"
                                    value="lost"
                                    checked
                                >
                                <label class="btn btn-outline-danger px-4" for="typeLost">
                                    I Lost Something
                                </label>

                                <input
                                    type="radio"
                                    class="btn-check"
                                    name="status"
                                    id="typeFound"
                                    value="found"
                                >
                                <label class="btn btn-outline-success px-4" for="typeFound">
                                    I Found Something
                                </label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="itemTitle" class="fw-bold small text-uppercase text-muted mb-2">
                                Item Title
                            </label>
                            <input
                                type="text"
                                id="itemTitle"
                                name="title"
                                class="form-control py-2"
                                placeholder="e.g., Blue Backpack, Sony Headphones"
                                maxlength="100"
                                required
                            >
                            <!-- Hata mesajı alanı — JS validasyonu tarafından doldurulur -->
                            <div class="invalid-feedback">Please enter an item title.</div>
                        </div>


                        <div class="row">

                            <div class="col-md-6 mb-4">
                                <label for="itemCategory" class="fw-bold small text-uppercase text-muted mb-2">
                                    Category
                                </label>
                                <select
                                    id="itemCategory"
                                    name="category"
                                    class="form-select py-2"
                                    required
                                >
                                    <option value="" disabled selected>Select a category</option>
                                    <option value="1">Electronics</option>
                                    <option value="2">ID Cards &amp; Wallet</option>
                                    <option value="3">Books &amp; Stationery</option>
                                    <option value="4">Keys</option>
                                </select>
                                <div class="invalid-feedback">Please select a category.</div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label for="itemLocation" class="fw-bold small text-uppercase text-muted mb-2">
                                    Building / Location
                                </label>
                                <select
                                    id="itemLocation"
                                    name="location"
                                    class="form-select py-2"
                                    required
                                >
                                    <option value="" disabled selected>Select a location</option>
                                    <option value="1">Central Library</option>
                                    <option value="2">Engineering Faculty</option>
                                    <option value="3">Student Center (Cafeteria)</option>
                                </select>
                                <div class="invalid-feedback">Please select a location.</div>
                            </div>

                        </div>

                        <div class="mb-4">
                            <label for="itemDescription" class="fw-bold small text-uppercase text-muted mb-2">
                                Description
                            </label>
                            <textarea
                                id="itemDescription"
                                name="description"
                                class="form-control"
                                rows="4"
                                placeholder="Describe the item details, specific location, or brand..."
                                maxlength="1000"
                                required
                            ></textarea>
                            <div class="invalid-feedback">Please add a description.</div>
                        </div>

                        <div class="mb-4">
                            <label for="itemPhoto" class="fw-bold small text-uppercase text-muted mb-2">
                                Upload Photo
                            </label>
                            <input
                                type="file"
                                id="itemPhoto"
                                name="item_photo"
                                class="form-control py-2"
                                accept="image/jpeg,image/png,image/webp"
                            >
                            <!-- Dosya boyutu hata mesajı — JS tarafından gösterilir -->
                            <div id="photoError" class="text-danger small mt-1" style="display:none;">
                                File size must be under 5MB.
                            </div>
                        </div>
                        <!-- /Fotoğraf Yükleme -->

                        <div class="d-grid pt-3">
                            <button
                                type="submit"
                                id="submitBtn"
                                class="btn c-btn-primary py-3 fw-bold"
                            >
                                Publish Listing
                            </button>
                        </div>
                        

                    </form>
                    

                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script>


        document.getElementById('itemPhoto').addEventListener('change', function () {
            const maxSize = 5 * 1024 * 1024; // 5MB (byte cinsinden)
            const errorEl = document.getElementById('photoError');

            if (this.files[0] && this.files[0].size > maxSize) {
                errorEl.style.display = 'block';
                this.value = ''; // Seçimi temizle
            } else {
                errorEl.style.display = 'none';
            }
        });

        document.getElementById('newAdForm').addEventListener('submit', function (e) {
            e.preventDefault(); // Önce validasyonu çalıştır

            const form = this;
            const submitBtn = document.getElementById('submitBtn');

            // Bootstrap validasyon class'larını uygula
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return; // Hata varsa gönderme
            }

            // Çift tıklama koruması — details-fixed.html'deki pattern'la aynı
            submitBtn.textContent = 'Publishing...';
            submitBtn.disabled = true;

            setTimeout(() => {
                console.log('Form gönderildi.');
                
                submitBtn.textContent = 'Publish Listing';
                submitBtn.disabled = false;
                form.classList.remove('was-validated');
            }, 1000);
        });

    </script>

</body>
</html>
