<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Ad | Campus Lost &amp; Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg c-navbar shadow mb-5">
        <div class="container">

            <a class="navbar-brand c-navbar__brand" href="01_index.html">
                <span>🎓</span> Campus Lost &amp; Found
            </a>

            <!--Mobilde görünür, masaüstünde gizlenir -->
            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavMenu"
                aria-controls="mainNavMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <!--Mobilde açılır/kapanır -->
            <div class="collapse navbar-collapse" id="mainNavMenu">
                <div class="ms-auto d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a class="nav-link text-white" href="05_dashboard.html">My Listings</a>
                    <a class="btn c-btn-primary px-4 shadow-sm" href="03_create-ad.html">+ Post New Ad</a>
                </div>
            </div>

        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="c-card p-5 shadow-sm border-0 rounded-4 bg-white">

                    <h2 class="fw-bold mb-4 c-form__title">Post a New Listing</h2>

                    <!-- =============================================
                         FORM
                         action: PHP backend hazır olunca upload_logic.php
                         enctype: dosya yükleme için zorunlu — doğru ✅
                         novalidate: özel JS validasyonu aktif olduğunda
                                     tarayıcı native validasyonunu devre dışı bırakır
                    ============================================= -->
                    <form
                        action="php/upload_logic.php"
                        method="POST"
                        enctype="multipart/form-data"
                        id="newAdForm"
                        novalidate
                    >

                        <div class="mb-4">
                            <span class="d-block fw-bold small text-uppercase text-muted mb-2">
                                Listing Type
                            </span>
                            <div class="d-flex gap-3">
                                <input
                                    type="radio"
                                    class="btn-check"
                                    name="status"
                                    id="typeLost"
                                    value="lost"
                                    checked
                                >
                                <label class="btn btn-outline-danger px-4" for="typeLost">
                                    I Lost Something
                                </label>

                                <input
                                    type="radio"
                                    class="btn-check"
                                    name="status"
                                    id="typeFound"
                                    value="found"
                                >
                                <label class="btn btn-outline-success px-4" for="typeFound">
                                    I Found Something
                                </label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="itemTitle" class="fw-bold small text-uppercase text-muted mb-2">
                                Item Title
                            </label>
                            <input
                                type="text"
                                id="itemTitle"
                                name="title"
                                class="form-control py-2"
                                placeholder="e.g., Blue Backpack, Sony Headphones"
                                maxlength="100"
                                required
                            >
                            <!-- Hata mesajı alanı — JS validasyonu tarafından doldurulur -->
                            <div class="invalid-feedback">Please enter an item title.</div>
                        </div>


                        <div class="row">

                            <div class="col-md-6 mb-4">
                                <label for="itemCategory" class="fw-bold small text-uppercase text-muted mb-2">
                                    Category
                                </label>
                                <select
                                    id="itemCategory"
                                    name="category"
                                    class="form-select py-2"
                                    required
                                >
                                    <!-- Seçenekler JS tarafından dinamik olarak doldurulur -->
                                    <option value="" disabled selected>Loading categories...</option>
                                </select>
                                <div class="invalid-feedback">Please select a category.</div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label for="itemLocation" class="fw-bold small text-uppercase text-muted mb-2">
                                    Building / Location
                                </label>
                                <select
                                    id="itemLocation"
                                    name="location"
                                    class="form-select py-2"
                                    required
                                >
                                    <!-- Seçenekler JS tarafından dinamik olarak doldurulur -->
                                    <option value="" disabled selected>Loading locations...</option>
                                </select>
                                <div class="invalid-feedback">Please select a location.</div>
                            </div>

                        </div>

                        <div class="mb-4">
                            <label for="itemDescription" class="fw-bold small text-uppercase text-muted mb-2">
                                Description
                            </label>
                            <textarea
                                id="itemDescription"
                                name="description"
                                class="form-control"
                                rows="4"
                                placeholder="Describe the item details, specific location, or brand..."
                                maxlength="1000"
                                required
                            ></textarea>
                            <div class="invalid-feedback">Please add a description.</div>
                        </div>

                        <div class="mb-4">
                            <label for="itemPhoto" class="fw-bold small text-uppercase text-muted mb-2">
                                Upload Photo
                            </label>
                            <input
                                type="file"
                                id="itemPhoto"
                                name="item_photo"
                                class="form-control py-2"
                                accept="image/jpeg,image/png,image/webp"
                            >
                            <!-- Dosya boyutu hata mesajı — JS tarafından gösterilir -->
                            <div id="photoError" class="text-danger small mt-1" style="display:none;">
                                File size must be under 5MB.
                            </div>
                        </div>
                        <!-- /Fotoğraf Yükleme -->

                        <!-- İşlem mesaj alanı — PHP'den dönen hata/başarı mesajı burada gösterilir -->
                        <div id="formAlert" class="alert d-none mb-3" role="alert"></div>

                        <div class="d-grid pt-3">
                            <button
                                type="submit"
                                id="submitBtn"
                                class="btn c-btn-primary py-3 fw-bold"
                            >
                                Publish Listing
                            </button>
                        </div>
                        

                    </form>
                    

                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script>
        /* ============================================================
         *  Yardımcı Fonksiyonlar
         * ============================================================ */

        /**
         * Kullanıcıya bildirim mesajı gösterir (Bootstrap alert).
         * @param {string} message    - Gösterilecek mesaj
         * @param {boolean} isSuccess - true: yeşil (success), false: kırmızı (danger)
         */
        function showAlert(message, isSuccess) {
            const alertEl = document.getElementById('formAlert');
            alertEl.className = 'alert mb-3 alert-' + (isSuccess ? 'success' : 'danger');
            alertEl.textContent = message;
            alertEl.classList.remove('d-none');
        }

        /**
         * Alert mesajını gizler.
         */
        function hideAlert() {
            const alertEl = document.getElementById('formAlert');
            alertEl.classList.add('d-none');
        }


        /* ============================================================
         *  DİNAMİK FORM SEÇENEKLERİ — Sayfa yüklendiğinde çalışır
         * ============================================================
         *  get_form_options.php'den categories ve locations verilerini
         *  çeker, <select> menülerini dinamik olarak doldurur.
         *  Böylece veritabanına yeni kayıt eklendiğinde HTML'e
         *  dokunmaya gerek kalmaz.
         * ============================================================ */
        document.addEventListener('DOMContentLoaded', function () {

            /**
             * Bir <select> elementini verilen veri dizisiyle doldurur.
             * @param {string} selectId      - Select elementinin ID'si
             * @param {Array}  items          - { id, name } nesnelerinden oluşan dizi
             * @param {string} placeholderText - İlk (disabled) seçeneğin metni
             */
            function populateSelect(selectId, items, placeholderText) {
                const select = document.getElementById(selectId);
                // Mevcut option'ları temizle
                select.innerHTML = '';

                // Placeholder (varsayılan seçenek) ekle
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.disabled = true;
                placeholder.selected = true;
                placeholder.textContent = placeholderText;
                select.appendChild(placeholder);

                // Veritabanından gelen her kayıt için option oluştur
                items.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id;        // Category_ID veya Location_ID
                    option.textContent = item.name; // Category_Name veya Location_Name
                    select.appendChild(option);
                });
            }

            // ── AJAX İsteği — get_form_options.php ──
            fetch('php/get_form_options.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // ✅ Veriler başarıyla geldi — select'leri doldur
                        populateSelect('itemCategory', data.categories, 'Select a category');
                        populateSelect('itemLocation', data.locations,  'Select a location');
                    } else {
                        // ❌ Veritabanı hatası
                        console.error('Form verileri yüklenemedi:', data.message);
                        showAlert('Form verileri yüklenirken hata oluştu. Sayfayı yenileyin.', false);
                    }
                })
                .catch(error => {
                    console.error('Form Options Fetch Hatası:', error);
                    showAlert('Sunucuya bağlanılamadı. Form verileri yüklenemedi.', false);
                });
        });


        /* ============================================================
         *  Fotoğraf Boyut Kontrolü (Client-Side)
         * ============================================================ */
        document.getElementById('itemPhoto').addEventListener('change', function () {
            const maxSize = 5 * 1024 * 1024; // 5MB (byte cinsinden)
            const errorEl = document.getElementById('photoError');

            if (this.files[0] && this.files[0].size > maxSize) {
                errorEl.style.display = 'block';
                this.value = ''; // Seçimi temizle
            } else {
                errorEl.style.display = 'none';
            }
        });


        /* ============================================================
         *  FORM GÖNDERİMİ — fetch API ile upload_logic.php'ye istek
         * ============================================================ */
        document.getElementById('newAdForm').addEventListener('submit', function (e) {
            // Formun varsayılan gönderimini (sayfa yenileme) engelle.
            // Böylece AJAX ile asenkron istek gönderebiliriz.
            e.preventDefault();

            const form      = this;
            const submitBtn = document.getElementById('submitBtn');

            // Önceki alert mesajını gizle
            hideAlert();

            // HTML5 form doğrulaması — geçersizse formu işaretleyip dur
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            // ── Çift tıklama koruması ──
            // Butonun metnini değiştirip disable ederek
            // kullanıcının birden fazla istek göndermesini engelle.
            submitBtn.textContent = 'Publishing...';
            submitBtn.disabled = true;

            // ── AJAX İsteği — fetch API ──
            // FormData nesnesi, formun tüm input değerlerini
            // (metin + dosya) otomatik olarak toplar.
            // enctype="multipart/form-data" fetch tarafında
            // otomatik olarak ayarlanır (Content-Type header'ı
            // set etmeyin — boundary parametresi kaybolur).
            fetch('php/upload_logic.php', {
                method: 'POST',
                body: new FormData(form)
            })
            .then(response => {
                // 401 Unauthorized — giriş yapılmamış
                if (response.status === 401) {
                    return response.json().then(data => {
                        showAlert(data.message || 'Oturum süreniz dolmuş. Lütfen giriş yapın.', false);
                        // 2 saniye sonra login sayfasına yönlendir
                        setTimeout(() => {
                            window.location.href = '04_auth.html';
                        }, 2000);
                        // İşlemi durdur — then zincirinin devam etmesini engelle
                        throw new Error('UNAUTHORIZED');
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // ✅ İlan başarıyla oluşturuldu
                    showAlert(data.message, true);

                    // Formu temizle
                    form.reset();
                    form.classList.remove('was-validated');

                    // 1.5 saniye sonra dashboard sayfasına yönlendir.
                    // Kullanıcı başarı mesajını görsün.
                    setTimeout(() => {
                        window.location.href = data.redirect || '05_dashboard.html';
                    }, 1500);
                } else {
                    // ❌ İlan oluşturulamadı — hata mesajını göster
                    showAlert(data.message, false);
                    submitBtn.textContent = 'Publish Listing';
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                // UNAUTHORIZED hatası zaten handle edildi, tekrar gösterme
                if (error.message === 'UNAUTHORIZED') return;

                // Ağ hatası veya sunucu çökmesi durumu
                console.error('Upload Fetch Hatası:', error);
                showAlert('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.', false);
                submitBtn.textContent = 'Publish Listing';
                submitBtn.disabled = false;
            });
        });

    </script>

</body>
</html>
